<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Aroma & Sabor - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #6f4e37, #3e2723); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h1 { color: #3e2723; text-align: center; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #8d6e63; margin-bottom: 32px; font-size: 14px; }
        .campo { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #4e342e; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #d7ccc8; border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: #6f4e37; box-shadow: 0 0 0 2px rgba(111,78,55,0.2); }
        button { width: 100%; padding: 12px; background: #6f4e37; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #4e342e; }
        .footer { text-align: center; margin-top: 24px; color: #8d6e63; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Café Aroma & Sabor</h1>
    <p class="subtitle">Faça login para continuar</p>
    <div th:if="${param.error}" style="color: #c62828; text-align: center; margin-bottom: 16px; font-size: 14px;">
        Usuário ou senha inválidos.
    </div>
    <div th:if="${param.logout}" style="color: #2e7d32; text-align: center; margin-bottom: 16px; font-size: 14px;">
        Você saiu do sistema.
    </div>
    <form action="#" th:action="@{/login}" method="post">
        <div class="campo">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
        </div>
        <div class="campo">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
        </div>
        <button type="submit">Entrar</button>
    </form>
    <p class="footer">Sistema de Gerenciamento</p>
</div>
</body>
</html>
