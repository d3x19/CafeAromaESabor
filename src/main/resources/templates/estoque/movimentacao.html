<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Aroma & Sabor - Movimentação</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f3ef; --surface: #ffffff; --primary: #4a3228; --primary-light: #6b4c3b;
            --accent: #c8854f; --accent-hover: #b3733e; --text: #2d1f18; --text-secondary: #8c7a71;
            --border: #e8e0d9; --shadow: 0 2px 12px rgba(74,50,40,0.08);
            --radius: 12px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        a { color: inherit; text-decoration: none; }

        header { background: var(--primary); color: #fff; padding: 0 32px; height: 68px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.15); }
        header .logo { font-size: 20px; font-weight: 800; }
        header .logo span { color: var(--accent); }
        .header-right { display: flex; align-items: center; gap: 24px; }
        .user-info { font-size: 14px; color: rgba(255,255,255,0.75); display: flex; align-items: center; gap: 8px; }
        .user-info strong { color: #fff; font-weight: 600; }
        nav { display: flex; gap: 4px; }
        nav a, nav form button { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); transition: all 0.2s; background: none; border: none; cursor: pointer; font-family: inherit; }
        nav a:hover, nav form button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        nav a.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 24px; }
        .card { background: var(--surface); border-radius: var(--radius); padding: 36px; box-shadow: var(--shadow); border: 1px solid var(--border); width: 100%; max-width: 480px; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
        .card-header .icon { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .card-header h2 { font-size: 20px; font-weight: 700; }
        .card-header p { font-size: 13px; color: var(--text-secondary); }
        .campo { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: var(--primary); font-weight: 600; font-size: 13px; }
        input, select { width: 100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,133,79,0.12); }
        .acoes { display: flex; gap: 10px; margin-top: 28px; }
        .acoes a, .acoes button { flex: 1; padding: 12px; text-align: center; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .btn-voltar { background: var(--bg); color: var(--text); }
        .btn-voltar:hover { background: var(--border); }
        .acoes button { background: var(--accent); color: #fff; border: none; cursor: pointer; font-family: inherit; }
        .acoes button:hover { background: var(--accent-hover); }

        footer { background: var(--primary); color: rgba(255,255,255,0.6); text-align: center; padding: 16px 24px; font-size: 13px; }
        footer strong { color: rgba(255,255,255,0.85); }

        @media (max-width: 600px) {
            header { padding: 0 16px; flex-wrap: wrap; height: auto; gap: 8px; padding-top: 12px; padding-bottom: 12px; }
            nav { flex-wrap: wrap; }
            .card { padding: 24px; }
        }
    </style>
</head>
<body>
<header>
    <div class="logo">☕ Café <span>Aroma & Sabor</span></div>
    <div class="header-right">
        <div class="user-info">👤 <strong sec:authentication="name">usuário</strong></div>
        <nav>
            <a th:href="@{/home}">Home</a>
            <a th:href="@{/produto}">Produtos</a>
            <a href="#" class="active">Estoque</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit">🚪 Sair</button>
            </form>
        </nav>
    </div>
</header>
<main>
    <div class="card">
        <div class="card-header">
            <div class="icon">📦</div>
            <div>
                <h2>Movimentação de Estoque</h2>
                <p>Registre entrada ou saída de produtos</p>
            </div>
        </div>
        <form th:action="@{/movimentacao}" method="post">
            <div class="campo">
                <label for="tipo">Tipo</label>
                <select id="tipo" name="tipo" required>
                    <option value="">Selecione...</option>
                    <option value="ENTRADA">⬆ Entrada</option>
                    <option value="SAIDA">⬇ Saída</option>
                </select>
            </div>
            <div class="campo">
                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" name="quantidade" min="1" placeholder="0" required>
            </div>
            <div class="campo">
                <label for="data">Data</label>
                <input type="date" id="data" name="data" required>
            </div>
            <div class="acoes">
                <a class="btn-voltar" th:href="@{/home}">← Voltar</a>
                <button type="submit">📥 Registrar</button>
            </div>
        </form>
    </div>
</main>
<footer>
    © 2026 <strong>Café Aroma & Sabor</strong> — Sistema de Gerenciamento
</footer>
</body>
</html>
