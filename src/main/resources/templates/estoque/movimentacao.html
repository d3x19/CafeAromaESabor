<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Aroma & Sabor - Movimentação</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f0eb; }
        header { background: #3e2723; color: #fff; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 22px; }
        nav { display: flex; gap: 20px; }
        nav a { color: #d7ccc8; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        nav a:hover { color: #fff; }
        main { max-width: 540px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        h2 { color: #3e2723; margin-bottom: 24px; font-size: 22px; text-align: center; }
        .campo { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #4e342e; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #d7ccc8; border-radius: 8px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #6f4e37; box-shadow: 0 0 0 2px rgba(111,78,55,0.2); }
        .acoes { display: flex; gap: 12px; margin-top: 24px; }
        .acoes a { flex: 1; padding: 12px; text-align: center; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; transition: background 0.3s; }
        .btn-voltar { background: #d7ccc8; color: #3e2723; }
        .btn-voltar:hover { background: #bcaaa4; }
        .acoes button { flex: 1; padding: 12px; background: #6f4e37; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .acoes button:hover { background: #4e342e; }
    </style>
</head>
<body>
<header>
    <h1>Café Aroma & Sabor</h1>
    <div style="display:flex;align-items:center;gap:20px;">
        <span style="color:#d7ccc8;font-size:14px;">
            <span sec:authentication="name">usuário</span>
        </span>
        <nav style="display:flex;gap:20px;">
            <a th:href="@{/home}">Home</a>
            <a th:href="@{/produto}">Produtos</a>
            <a th:href="@{/estoque}">Estoque</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" style="background:none;color:#d7ccc8;border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;padding:0;">Sair</button>
            </form>
        </nav>
    </div>
</header>
<main>
    <div class="card">
        <h2>Movimentação de Estoque</h2>
        <form action="#" th:action="@{/movimentacao}" method="post">
            <div class="campo">
                <label for="tipo">Tipo</label>
                <select id="tipo" name="tipo" required>
                    <option value="">Selecione...</option>
                    <option value="ENTRADA">Entrada</option>
                    <option value="SAIDA">Saída</option>
                </select>
            </div>
            <div class="campo">
                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" name="quantidade" min="1" placeholder="0" required>
            </div>
            <div class="campo">
                <label for="data">Data</label>
                <input type="date" id="data" name="data" required>
            </div>
            <div class="acoes">
                <a class="btn-voltar" th:href="@{/home}">Voltar</a>
                <button type="submit">Registrar</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
